name: HOLD OVK Chart Auto Update

on:
  schedule:
    # Futtatás naponta délután 15:15-kor budapesti idő szerint (CET = UTC+1, CEST = UTC+2)
    # Télen (CET): 14:15 UTC -> '15 14 * * *'
    # Nyáron (CEST): 13:15 UTC -> '15 13 * * *'
    # A 13:15 UTC jó középút, nyáron 15:15-kor, télen 14:15-kor fut le (amikor a BAMOSZ adatok már garantáltan frissültek)
    - cron: '15 13 * * *'
  workflow_dispatch: # Lehetővé teszi a manuális indítást a GitHub felületéről

permissions:
  contents: write # Szükséges a módosított JSON visszatöltéséhez (Git Push)

jobs:
  update-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r hold_chart/requirements.txt

      - name: Run Scraper & Update Widget
        run: |
          python hold_chart/run_all.py
        env:
          # Átadjuk a titkosított adatokat a tárhelyre való FTP feltöltéshez
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_DIR }}

      - name: Commit and push JSON changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add hold_chart/ovk_data.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update OVK data"
            git push
          else
            echo "No changes to commit"
          fi
